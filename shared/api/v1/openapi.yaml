openapi: 3.0.3

info:
  title: anti-yt api
  description: anti-yt api
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Localhost server

tags:
  - name: auth
    description: 認証
  - name: misc
    description: その他
  - name: channel
    description: チャンネル
  - name: video
    description: 動画
  - name: user
    description: ユーザー
  - name: history
    description: 履歴
  - name: playlist
    description: プレイリスト

security:
  - CookieJwtAuth: [ ]

paths:
  # ========================================
  # auth - 認証
  # ========================================
  /api/v1/auth/refresh:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    post:
      summary: Refresh access token
      description: リフレッシュトークンを用いて新しいアクセストークンを発行する。
      operationId: postAuthRefresh
      parameters:
        - $ref: "#/components/parameters/HeaderCSRFToken"
        - $ref: "#/components/parameters/CookieCSRFToken"
      tags: [ auth ]
      security: [ ]
      responses:
        "200":
          description: 200 OK
          headers:
            Set-Cookie:
              schema:
                type: array
                items:
                  type: string
                description: access_tokenとrefresh_tokenを指定
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/google:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    get:
      summary: Google authentication
      description: Google OIDCでログインor登録
      operationId: getAuthGoogle
      security: [ ]
      tags: [ auth ]
      responses:
        "302":
          description: 302 redirect
          headers:
            Location:
              schema:
                type: string
                description: Googleの認証画面へリダイレクト
            Set-Cookie:
              schema:
                type: array
                items:
                  type: string
                description: stateとcode_verifierを指定
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/google/callback:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    get:
      tags: [ auth ]
      summary: Google Authorization Code Callback
      description: Googleの認可コードを受け取るため
      operationId: getAuthGoogleCallback
      security: [ ]
      parameters:
        - name: code
          description: Googleから発行された認可コード
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          description: CSRF対策用
          schema:
            type: string
        - name: csrf
          in: cookie
          required: true
          description: CSRF対策
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: エラー
          schema:
            type: string
      responses:
        "302":
          description: 302 redirect
          headers:
            Location:
              schema:
                type: string
                description: 登録画面かダッシュボード
            Set-Cookie:
              schema:
                type: array
                items:
                  type: string
                description: アクセストークンとリフレッシュトークンとCSRF Tokenを設定。
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/logout:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    post:
      tags: [ auth ]
      summary: Logout
      description: ログアウトする
      operationId: postAuthLogout
      responses:
        "200":
          description: 200 OK
          headers:
            Set-Cookie:
              schema:
                type: array
                items:
                  type: string
                description: アクセストークン、リフレッシュトークン、CSRFトークン削除。
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/users/me/sessions:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    get:
      tags: [ auth ]
      summary: User session list
      description: ユーザーのセッション一覧
      operationId: getUsersMeSessions
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    description: 総件数
                    minimum: 0
                    type: integer
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID
                        created_at:
                          type: string
                          format: date-time
                          description: ログイン時刻
                        last_logged_in_at:
                          type: string
                          format: date-time
                          description: 最終ログイン時刻
                        city_name:
                          type: string
                          description: セッションの住所
                        browser_name:
                          type: string
                          description: ブラウザの名前
                        country_code:
                          type: string
                          description: 国コード
                          maxLength: 2
                          minLength: 2
                      required: [ id, created_at, last_logged_in_at, city_name, browser_name, country_code ]
                required: [ item_count, items ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/users/me/sessions/{session_id}:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    delete:
      tags: [ auth ]
      summary: Delete session
      description: セッションを削除
      operationId: deleteUsersMeSessionsSessionId
      parameters:
        - name: session_id
          required: true
          schema:
            type: string
            format: uuid
          in: path
      responses:
        "204":
          description: 204 No Content
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ========================================
  # misc - その他
  # ========================================
  /health:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    get:
      summary: Health check
      description: APIサーバーのヘルスチェックを行う。
      operationId: getHealth
      tags: [ misc ]
      security: [ ]
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required: [ status ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ========================================
  # channel - チャンネル
  # ========================================
  /api/v1/feed/channels:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    get:
      tags: [ channel ]
      summary: Get channels
      description: 有益なチャンネル一覧を取得
      operationId: getFeedChannels
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    type: integer
                    minimum: 0
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        channel_id:
                          type: string
                          format: uuid
                        external_channel_icon_url:
                          type: string
                          format: uri
                        external_channel_id:
                          type: string
                        videos:
                          type: object
                          properties:
                            item_count:
                              type: integer
                              minimum: 0
                            items:
                              type: array
                              uniqueItems: true
                              items:
                                type: object
                                properties:
                                  video_id:
                                    type: string
                                    format: uuid
                                  external_video_id:
                                    type: string
                                  external_video_thumbnail_url:
                                    type: string
                                    format: uri
                                  external_video_title:
                                    type: string
                                  external_video_description:
                                    type: string
                                  external_channel_display_name:
                                    type: string
                                  external_video_length_seconds:
                                    type: integer
                                    minimum: 0
                                required: [ video_id, external_video_id, external_video_thumbnail_url, external_video_title, external_video_description ]
                          required: [ item_count, items ]
                      required: [ channel_id, external_channel_icon_url, external_channel_display_name ]
                required: [ item_count, items ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/channels/{channel_id}/videos:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    get:
      tags: [ channel ]
      summary: Get latest channel uploads
      description: チャンネルが投稿している動画を一覧で表示する
      operationId: getChannelsChannelIdVideos
      parameters:
        - name: channel_id
          in: path
          schema:
            type: string
            format: uuid
          required: true
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
          required: false
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    type: integer
                    minimum: 0
                  has_next:
                    type: boolean
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        video_id:
                          type: string
                          format: uuid
                        external_video_id:
                          type: string
                        external_video_thumbnail_url:
                          type: string
                          format: uri
                        external_video_watch_count:
                          type: integer
                          minimum: 0
                        external_video_title:
                          type: string
                        external_video_description:
                          type: string
                        external_video_created_at:
                          type: string
                          format: date-time
                        external_video_length_seconds:
                          type: integer
                          minimum: 0
                        last_watch_seconds:
                          type: integer
                          minimum: 0
                      required: [ video_id, external_video_id, external_video_thumbnail_url, external_video_watch_count, external_video_title, external_video_description, external_video_created_at, external_video_length_seconds ]
                required: [ item_count, has_next, items ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/subscriptions:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    get:
      tags: [ channel ]
      summary: Get subscriptions
      description: 現在の登録チャンネル一覧を取得
      operationId: getSubscriptions
      parameters:
        - name: limit
          description: 取得する最大の数
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          description: 最後に取得したチャンネルID(ページネーション)
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_next:
                    type: boolean
                    description: ページネーションで次のページがあるかどうか
                  item_count:
                    type: integer
                    minimum: 0
                    description: レスポンスの総件数
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        channel_id:
                          type: string
                          format: uuid
                          description: 登録したチャンネルID(内部)
                        external_channel_id:
                          type: string
                          pattern: "^UC[a-zA-Z0-9_-]{22}$"
                          description: 登録したチャンネルID(ハンドル名ではない)
                        created_at:
                          type: string
                          format: date-time
                          description: 登録日時
                        external_channel_display_name:
                          type: string
                          description: 登録したチャンネルの表示名
                        channel_custom_id:
                          type: string
                          description: チャンネルのカスタムID(ハンドル名)
                          minLength: 3
                        channel_description:
                          type: string
                          description: 登録したチャンネルの説明文
                        external_channel_icon_url:
                          type: string
                          description: チャンネルのアイコンURL
                          format: uri
                        channel_subscribers_count:
                          type: integer
                          minimum: 0
                          description: チャンネルの登録者数
                        channel_created_at:
                          type: string
                          format: date-time
                          description: チャンネルの作成日
                      required: [ channel_id, external_channel_id, created_at, external_channel_display_name, channel_custom_id, channel_description, external_channel_icon_url, channel_subscribers_count, channel_created_at ]
                required: [ items, item_count, has_next ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [ channel ]
      summary: Subscribe new channel
      description: 新しいチャンネルを登録する
      operationId: postSubscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel_id:
                  type: string
                  description: 登録するチャンネルID or ハンドル名
              required: [ channel_id ]
      responses:
        "201":
          description: 201 Created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                type: object
                properties:
                  channel_id:
                    type: string
                    format: uuid
                    description: 登録したチャンネルID(内部)
                  external_channel_id:
                    type: string
                    pattern: "^UC[a-zA-Z0-9_-]{22}$"
                    description: 登録したチャンネルID(ハンドル名ではない)
                  created_at:
                    type: string
                    format: date-time
                    description: 登録日時
                  external_channel_display_name:
                    type: string
                    description: 登録したチャンネルの表示名
                  channel_custom_id:
                    type: string
                    description: チャンネルのカスタムID(ハンドル名)
                    minLength: 3
                  channel_description:
                    type: string
                    description: 登録したチャンネルの説明文
                  external_channel_icon_url:
                    type: string
                    description: チャンネルのアイコンURL
                    format: uri
                  channel_subscribers_count:
                    type: integer
                    minimum: 0
                    description: チャンネルの登録者数
                  channel_created_at:
                    type: string
                    format: date-time
                    description: チャンネルの作成日
                required: [ channel_id, external_channel_id, created_at, external_channel_display_name, channel_custom_id, channel_description, external_channel_icon_url, channel_subscribers_count, channel_created_at ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/subscriptions/{channel_id}:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    delete:
      tags: [ channel ]
      summary: Delete subscription
      description: 登録を解除する
      operationId: deleteSubscriptionsChannelId
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: チャンネルID(内部ID)
      responses:
        "204":
          description: 204 No Content
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ========================================
  # video - 動画
  # ========================================
  /api/v1/search:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderDeviceFingerprint'
    get:
      tags: [ video ]
      summary: Get search result
      description: 検索を行う
      operationId: getSearch
      parameters:
        - name: limit
          description: 検索の結果の制限数
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          description: ページネーション
          in: query
          required: false
          schema:
            type: string
        - name: query
          in: query
          required: true
          description: 検索のクエリ文字列
          schema:
            type: string
            minLength: 1
        - name: search_type
          in: query
          required: true
          description: 検索のタイプ
          schema:
            allOf:
              - $ref: "#/components/schemas/SearchType"
            default: video
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    type: integer
                    minimum: 0
                  has_next:
                    type: boolean
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        video_id:
                          type: string
                          format: uuid
                        channel_id:
                          type: string
                          format: uuid
                        external_video_id:
                          type: string
                        external_channel_id:
                          type: string
                        external_video_thumbnail_url:
                          type: string
                          format: uri
                        external_channel_icon_url:
                          type: string
                          format: uri
                        external_video_watch_count:
                          type: integer
                          minimum: 0
                        external_video_title:
                          type: string
