openapi: 3.0.3

info:
  title: anti-yt api
  description: anti-yt api
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Localhost server

tags:
  - name: auth
    description: 認証
  - name: misc
    description: その他
  - name: channel
    description: チャンネル
  - name: video
    description: 動画
  - name: user
    description: ユーザー
  - name: history
    description: 履歴
  - name: playlist
    description: プレイリスト
  - name: feed
    description: フィード・検索

security:
  - CookieJwtAuth: [ ]

paths:
  # ========================================
  # auth - 認証
  # ========================================
  /api/v1/auth/refresh:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    post:
      summary: Refresh access token
      description: リフレッシュトークンを用いて新しいアクセストークンを発行する。
      operationId: postAuthRefresh
      parameters:
        - $ref: "#/components/parameters/HeaderCSRFToken"
        - $ref: "#/components/parameters/CookieCSRFToken"
      tags: [ auth ]
      security: [ ]
      responses:
        "200":
          description: 200 OK
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/reactivate:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    post:
      summary: Reactivate account
      description: リフレッシュトークンを用いて削除したアカウントの復元をする
      operationId: postAuthReactivate
      parameters:
        - $ref: "#/components/parameters/HeaderCSRFToken"
        - $ref: "#/components/parameters/CookieCSRFToken"
      tags: [ auth ]
      security: [ ]
      responses:
        "200":
          description: 200 OK
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/google:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
    get:
      summary: Google authentication
      description: Google OIDCでログインor登録
      operationId: getAuthGoogle
      security: [ ]
      tags: [ auth ]
      parameters:
        - name: platform
          in: query
          required: false
          description: デバイスのタイプ (mobile or web)
          schema:
            type: string
            enum: [ web, mobile ]
            default: web
      responses:
        "302":
          description: 302 redirect
          headers:
            Location:
              schema:
                type: string
                description: Googleの認証画面へリダイレクト
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/google/callback:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
    get:
      tags: [ auth ]
      summary: Google Authorization Code Callback
      description: Googleの認可コードを受け取るため
      operationId: getAuthGoogleCallback
      security: [ ]
      parameters:
        - name: code
          description: Googleから発行された認可コード
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          description: CSRF対策用
          schema:
            type: string
        - name: csrf
          in: cookie
          required: true
          description: CSRF対策
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: エラー
          schema:
            type: string
      responses:
        "302":
          description: 302 redirect
          headers:
            Location:
              schema:
                type: string
                description: 登録画面かダッシュボード
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/oauth/youtube:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
    get:
      summary: YouTube OAuth authentication
      description: YouTubeアカウントと連携するためのOAuth認証を開始する
      operationId: getAuthOauthYoutube
      tags: [ auth ]
      parameters:
        - name: subscriptions
          in: query
          required: false
          description: チャンネル登録をインポートするかどうか
          schema:
            type: boolean
        - name: likes
          in: query
          required: false
          description: 高評価動画をインポートするかどうか
          schema:
            type: boolean
      responses:
        "302":
          description: 302 redirect
          headers:
            Location:
              schema:
                type: string
                description: YouTubeの認証画面へリダイレクト
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/oauth/youtube/callback:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
    get:
      tags: [ auth ]
      summary: YouTube OAuth Callback
      description: YouTubeの認可コードを受け取るため
      operationId: getAuthOauthYoutubeCallback
      security: [ ]
      parameters:
        - name: code
          description: YouTubeから発行された認可コード
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          description: CSRF対策用
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: エラー
          schema:
            type: string
      responses:
        "302":
          description: 302 redirect
          headers:
            Location:
              schema:
                type: string
                description: 連携完了後のリダイレクト先
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/logout:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    post:
      tags: [ auth ]
      summary: Logout
      description: ログアウトする
      operationId: postAuthLogout
      responses:
        "200":
          description: 200 OK
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/users/me/sessions:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    get:
      tags: [ auth ]
      summary: User session list
      description: ユーザーのセッション一覧
      operationId: getUsersMeSessions
      parameters:
        - name: limit
          description: 取得する最大の数
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
          required: false
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    description: 総件数
                    minimum: 0
                    type: integer
                  has_next:
                    type: boolean
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: ID
                        created_at:
                          type: string
                          format: date-time
                          description: ログイン時刻
                        last_logged_in_at:
                          type: string
                          format: date-time
                          description: 最終ログイン時刻
                        city_name:
                          type: string
                          description: セッションの住所
                        browser_name:
                          type: string
                          description: ブラウザの名前
                        country_code:
                          type: string
                          description: 国コード
                          maxLength: 2
                          minLength: 2
                        ip_address:
                          type: string
                          description: IPアドレス
                        device_type:
                          type: string
                          description: デバイスの種類
                        user_agent:
                          type: string
                          description: ユーザーエージェント
                      required: [ id, created_at, last_logged_in_at, city_name, browser_name, country_code, ip_address, device_type, user_agent ]
                required: [ item_count, has_next, items ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/users/me/sessions/{session_id}:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    delete:
      tags: [ auth ]
      summary: Delete session
      description: セッションを削除
      operationId: deleteUsersMeSessionsSessionId
      parameters:
        - name: session_id
          required: true
          schema:
            type: string
            format: uuid
          in: path
      responses:
        "204":
          description: 204 No Content
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ========================================
  # misc - その他
  # ========================================
  /health:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    get:
      summary: Health check
      description: APIサーバーのヘルスチェックを行う。
      operationId: getHealth
      tags: [ misc ]
      security: [ ]
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required: [ status ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ========================================
  # channel - チャンネル
  # ========================================
  /api/v1/feed/channels:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    get:
      tags: [ channel ]
      summary: Get channels
      description: 有益なチャンネル一覧を取得
      operationId: getFeedChannels
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    type: integer
                    minimum: 0
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        channel_id:
                          type: string
                          format: uuid
                        external_channel_icon_url:
                          type: string
                          format: uri
                        external_channel_display_name:
                          type: string
                        external_channel_cusom_url:
                          type: string
                          minLength: 4
                        category_code:
                          type: integer
                          minimum: 0
                        valuable_description:
                          type: string
                          maxLength: 256
                      required: [ channel_id, external_channel_icon_url, external_channel_display_name, external_channel_cusom_url, category_code, valuable_description ]
                required: [ item_count, items ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/channels/{channel_id}:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    get:
      tags: [ channel ]
      summary: Get channel detail
      description: チャンネルの詳細情報を取得する
      operationId: getChannelsChannelId
      security: [ ]
      parameters:
        - name: channel_id
          in: path
          schema:
            type: string
            format: uuid
          required: true
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  channel_id:
                    type: string
                    format: uuid
                  external_channel_custom_id:
                    type: string
                  external_channel_display_name:
                    type: string
                  external_channel_description:
                    type: string
                  external_channel_icon_url:
                    type: string
                    format: uri
                  external_channel_subscribers_count:
                    type: integer
                    minimum: 0
                required: [ channel_id, external_channel_custom_id, external_channel_display_name, external_channel_description, external_channel_icon_url, external_channel_subscribers_count ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/channels/{channel_id}/videos:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    get:
      tags: [ channel ]
      summary: Get latest channel uploads
      description: チャンネルが投稿している動画を一覧で表示する
      operationId: getChannelsChannelIdVideos
      security: [ ]
      parameters:
        - name: channel_id
          in: path
          schema:
            type: string
            format: uuid
          required: true
        - name: limit
          description: 取得する最大の数
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
          required: false
        - name: order
          description: "並び順（newer: 新しい順, older: 古い順）"
          in: query
          required: false
          schema:
            type: string
            enum:
              - newer
              - older
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    type: integer
                    minimum: 0
                  has_next:
                    type: boolean
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        video_id:
                          type: string
                          format: uuid
                        external_video_thumbnail_url:
                          type: string
                          format: uri
                        external_video_title:
                          type: string
                        external_video_created_at:
                          type: string
                          format: date-time
                        external_video_length_seconds:
                          type: integer
                          minimum: 0
                        last_watch_seconds:
                          type: integer
                          minimum: 0
                        is_watched:
                          type: boolean
                      required: [ video_id, external_video_thumbnail_url, external_video_title, external_video_created_at, external_video_length_seconds, is_watched ]
                required: [ item_count, has_next, items ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/channels/{channel_id}/playlists:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    get:
      tags: [ channel ]
      summary: Get channel playlists
      description: チャンネルのプレイリスト一覧を取得する
      operationId: getChannelsChannelIdPlaylists
      security: [ ]
      parameters:
        - name: channel_id
          in: path
          schema:
            type: string
            format: uuid
          required: true
        - name: limit
          description: 取得する最大の数
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          description: ページネーション
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    type: integer
                    minimum: 0
                  has_next:
                    type: boolean
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      properties:
                        playlist_id:
                          type: string
                          format: uuid
                        playlist_title:
                          type: string
                        playlist_video_count:
                          type: integer
                          minimum: 0
                        playlist_registered_at:
                          type: string
                          format: date-time
                        top_video_thumbnail_url:
                          type: string
                          format: uri
                      required: [ playlist_id, playlist_title, playlist_video_count, playlist_registered_at ]
                required: [ item_count, has_next, items ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/channels/subscribed:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    get:
      tags: [ channel ]
      summary: Get subscribed channels
      description: 現在の登録チャンネル一覧を取得
      operationId: getChannelsSubscribed
      parameters:
        - name: limit
          description: 取得する最大の数
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          description: 最後に取得したchannel_id(ページネーション)
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_next:
                    type: boolean
