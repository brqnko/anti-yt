                        video_id:
                          type: string
                          format: uuid
                          description: 内部ID
                        watch_position_seconds:
                          type: integer
                          minimum: 0
                          description: 視聴途中の時間
                        watched_at:
                          type: string
                          format: date-time
                          description: 履歴の時刻
                        is_watched:
                          type: boolean
                          description: ユーザーが視聴済みとしてマークしているかどうか
                        external_video_thumbnail_url:
                          type: string
                          format: uri
                          description: サムネイルURL
                        external_video_title:
                          type: string
                          description: 動画のタイトル
                        external_video_length_seconds:
                          type: integer
                          description: 動画の長さ(秒数)
                          minimum: 0
                        channel_id:
                          type: string
                          format: uuid
                          description: チャンネルの内部ID
                        external_channel_icon_url:
                          type: string
                          format: uri
                          description: チャンネルのアイコンURL
                        external_channel_display_name:
                          type: string
                          description: チャンネルの表示名
                      required: [ watch_id, video_id, watch_position_seconds, watched_at, is_watched, external_video_thumbnail_url, external_video_title, external_video_length_seconds, channel_id, external_channel_display_name, external_channel_icon_url ]
                    uniqueItems: true
                required: [ item_count, has_next, items ]
