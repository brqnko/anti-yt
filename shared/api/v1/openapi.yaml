      operationId: getHistory
      parameters:
        - name: limit
          description: 取得する最大の数
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          description: 最後に取得した視聴履歴のwatch_id(ページネーション)
