components:
  responses:
    InternalServerError:
      description: 500 Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetailError"

    NotFound:
      description: 404 Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetailError"

    Unauthorized:
      description: 401 Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetailError"

    Forbidden:
      description: 403 Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetailError"

    BadRequest:
      description: 400 Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetailError"

    PayloadTooLarge:
      description: 413 Payload Too Large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetailError"

    TooManyRequests:
      description: 429 Too Many Requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetailError"

  schemas:
    ProblemDetailError:
      type: object
      properties:
        title:
          type: string
        detail:
          type: string
      required: [ title, detail ]

    ScreenTimeSlot:
      type: object
      description: スクリーン時間の許可時間帯
      properties:
        id:
          type: string
          format: uuid
          description: スロットID
        start_time:
          type: string
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          description: 開始時刻 (HH:mm形式)
        end_time:
          type: string
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          description: 終了時刻 (HH:mm形式)
      required: [ id, start_time, end_time ]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ユーザーID
        display_name:
          type: string
          description: ユーザーの表示名
          minLength: 3
        language_code:
          type: string
          minLength: 2
          maxLength: 2
          description: アカウントの言語コード
        joined_at:
          type: string
          format: date-time
          description: アカウント作成日
        screen_time:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ScreenTimeSlot"
        daily_screen_seconds:
          type: integer
          description: 毎日のスクリーン時間制限
          minimum: 0
        daily_remaining_seconds:
          type: integer
          description: 今日の残りの時間（設定していない場合はなし）
          minimum: 0
      required: [ id, display_name, joined_at, screen_time ]

    SearchType:
      type: string
      enum: [ video, channel ]
      description: 検索のタイプ

    ResourceType:
      type: string
      enum: [ video, channel ]
      description: リソースのタイプ

    PlaylistType:
      type: string
      enum: [ normal ]
      description: プレイリストのタイプ

    PlaylistVisibility:
      type: string
      enum: [ private ]
      description: プレイリストの公開範囲

  parameters:
    HeaderXRealIP:
      name: X-Real-IP
      in: header
      description: クライアントの実際のIPアドレス（プロキシ経由の場合）
      required: true
      schema:
        type: string
        format: ipv4
        example: "203.0.113.195"

    HeaderCfIpCountry:
      name: Cf-Ipcountry
      in: header
      description: Cloudflareが検出したクライアントの国コード（ISO 3166-1 alpha-2）
      required: true
      schema:
        type: string
        format: iso-3166-1-alpha-2
        minLength: 2
        maxLength: 2

    HeaderCfRay:
      name: Cf-Ray
      in: header
      description: Cloudflareリクエストの一意識別子（トレーシング用）
      required: true
      schema:
        type: string

    HeaderUserAgent:
      name: User-Agent
      in: header
      description: クライアントのブラウザ・アプリケーション情報
      required: true
      schema:
        type: string

    CookieCSRFToken:
      name: csrf_token
      in: cookie
      required: true
      schema:
        type: string
      description: CSRF Token

    HeaderCSRFToken:
      name: x-csrf-token
      required: true
      in: header
      schema:
        type: string
        description: CSRF Token

    HeaderDeviceFingerprint:
      name: X-Device-Fingerprint
      in: header
      required: true
      schema:
        type: string

  securitySchemes:
    CookieJwtAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: JWT Access Token in Cookie
