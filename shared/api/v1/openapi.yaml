        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_next:
                    type: boolean
                    description: ページネーションで次のページがあるかどうか
                  item_count:
                    type: integer
                    minimum: 0
                    description: レスポンスの総件数
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        watch_id:
                          type: string
                          format: uuid
