  # video - 動画
  # ========================================
  /api/v1/search:
    parameters:
      - $ref: '#/components/parameters/HeaderXRealIP'
      - $ref: '#/components/parameters/HeaderCfIpCountry'
      - $ref: '#/components/parameters/HeaderCfRay'
      - $ref: '#/components/parameters/HeaderUserAgent'
      - $ref: '#/components/parameters/HeaderTimezone'
    get:
      tags: [ feed ]
      summary: Get search result
      description: 検索を行う
      operationId: getSearch
      parameters:
        - name: limit
          description: 検索の結果の制限数
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          description: ページネーション
          in: query
          required: false
          schema:
            type: string
        - name: query
          in: query
          required: true
          description: 検索のクエリ文字列
          schema:
            type: string
            minLength: 1
        - name: language
          in: query
          required: false
          description: 検索の言語（例：ja, en）
          schema:
            type: string
        - name: order
          in: query
          required: false
          description: 検索結果の並び順
          schema:
            type: string
            enum: [ date, rating, relevance, title, videoCount, viewCount ]
            default: relevance
        - name: published_before
          in: query
          required: false
          description: この日時より前に公開された動画のみ（RFC 3339形式）
          schema:
            type: string
            format: date-time
        - name: published_after
          in: query
          required: false
          description: この日時より後に公開された動画のみ（RFC 3339形式）
          schema:
            type: string
            format: date-time
        - name: region_code
          in: query
          required: false
          description: 地域コード（ISO 3166-1 alpha-2、例：JP, US）
          schema:
            type: string
        - name: relevance_language
          in: query
          required: false
          description: 指定した言語に最も関連性の高い結果を優先する（例：ja, en）
          schema:
            type: string
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item_count:
                    type: integer
                    minimum: 0
                  has_next:
                    type: boolean
                  cursor:
                    type: string
                    description: 次ページのカーソル（ページネーション用）
                  items:
                    type: array
                    uniqueItems: true
                    items:
                      type: object
                      required: [ type, channel_id, external_channel_id, external_channel_display_name, external_channel_icon_url ]
                      properties:
                        type:
                          type: string
                        # 動画・チャンネル共通
                        channel_id:
                          type: string
                          format: uuid
                        external_channel_id:
                          type: string
                        external_channel_display_name:
                          type: string
                        external_channel_icon_url:
                          type: string
                          format: uri
                        # 動画のみ
                        video_id:
                          type: string
                          format: uuid
                        external_video_id:
                          type: string
                        external_video_thumbnail_url:
                          type: string
                          format: uri
                        external_video_title:
                          type: string
                        external_video_description:
                          type: string
                        external_video_created_at:
                          type: string
                          format: date-time
                        external_video_length_seconds:
                          type: integer
                          minimum: 0
                        last_watch_seconds:
                          type: integer
                          minimum: 0
                        # チャンネルのみ
                        channel_custom_id:
                          type: string
                        channel_subscribers_count:
                          type: integer
                          minimum: 0
                required: [ item_count, has_next, items ]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
