<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="apple-touch-icon" href="/icon-192x192.svg" />

    <!-- Primary Meta -->
    <title>anti-yt | Break the YouTube Cycle</title>
    <meta name="description" content="Reclaim your time from the algorithm. Strict time controls, whitelist-based filtering, and distraction-free focus zones designed for a clearer mind." />
    <meta name="robots" content="index, follow" />

    <!-- Canonical & hreflang -->
    <link rel="canonical" href="https://anti-yt.app/" />
    <link rel="alternate" hreflang="en" href="https://anti-yt.app/" />
    <link rel="alternate" hreflang="ja" href="https://anti-yt.app/" />
    <link rel="alternate" hreflang="x-default" href="https://anti-yt.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://anti-yt.app/" />
    <meta property="og:title" content="anti-yt | Break the YouTube Cycle" />
    <meta property="og:description" content="Reclaim your time from the algorithm. Strict time controls, whitelist-based filtering, and distraction-free focus zones designed for a clearer mind." />
    <meta property="og:image" content="https://anti-yt.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="anti-yt" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="anti-yt | Break the YouTube Cycle" />
    <meta name="twitter:description" content="Reclaim your time from the algorithm. Strict time controls, whitelist-based filtering, and distraction-free focus zones designed for a clearer mind." />
    <meta name="twitter:image" content="https://anti-yt.app/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "anti-yt",
        "url": "https://anti-yt.app/",
        "description": "Reclaim your time from the algorithm. Strict time controls, whitelist-based filtering, and distraction-free focus zones designed for a clearer mind.",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        var m = localStorage.getItem("color-mode") || "system";
        var t =
          m === "system"
            ? window.matchMedia("(prefers-color-scheme:dark)").matches
              ? "dark"
              : "light"
            : m;
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <div id="app"></div>
    <script prerender type="module" src="/src/index.tsx"></script>
  </body>
</html>
