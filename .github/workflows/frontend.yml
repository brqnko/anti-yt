name: frontend.yml
on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
    branches: [main, prod]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
    env:
      NPM_CONFIG_REGISTRY: https://npm.flatt.tech/

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Takumi Guard (npm)
        uses: flatt-security/setup-takumi-guard-npm@v1

      - name: Verify npm registry is Takumi Guard
        run: |
          actual="$(npm config get registry)"
          echo "registry=$actual"
          if [ "$actual" != "https://npm.flatt.tech/" ]; then
            echo "::error::npm is not routed through Takumi Guard (registry=$actual)"
            exit 1
          fi

      - run: npm ci

      - name: Generate API client (orval)
        run: npm run generate

      - name: Check generated code is up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated code is out of date. Please run 'npm run generate' locally and commit the changes."
            git diff --stat
            exit 1
          fi

      - run: npm run lint

      - run: npm run build