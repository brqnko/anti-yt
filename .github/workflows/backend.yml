name: backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
    branches: [main, prod]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anti_yt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: backend/go.sum

      - run: go mod download

      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.30.0'

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.24.0

      - uses: k1LoW/setup-tbls@v1
        with:
          version: v1.93.0

      - name: Run migrations
        run: goose -dir migrations postgres "postgres://postgres:postgres@localhost:5432/anti_yt_test?sslmode=disable" up

      - name: Generate sqlc
        run: sqlc generate

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.6.0

      - name: Generate oapi-codegen
        run: go generate ./internal/core/handler/v1/

      - name: Generate tbls docs
        run: tbls doc "postgres://postgres:postgres@localhost:5432/anti_yt_test?sslmode=disable" docs/schema --er-format svg --rm-dist --force

      - name: Check generated code is up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated code is out of date. Please run code generation locally and commit the changes."
            git diff --stat
            exit 1
          fi

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend

      - run: go build -v -o server ./cmd/api
