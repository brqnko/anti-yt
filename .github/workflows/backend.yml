name: backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
    branches: [main, prod]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Start Postgres
        run: |
          docker run -d --name pg \
            --tmpfs /var/lib/postgresql:rw \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=anti_yt_test \
            -p 5432:5432 \
            postgres:18.1-alpine3.23 \
            postgres \
              -c fsync=off \
              -c synchronous_commit=off \
              -c full_page_writes=off \
              -c max_connections=200
          for i in $(seq 1 30); do
            if docker exec pg pg_isready -U postgres >/dev/null 2>&1; then
              echo "postgres ready"
              exit 0
            fi
            sleep 1
          done
          echo "postgres failed to become ready" >&2
          docker logs pg
          exit 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: backend/go.sum

      - run: go mod download

      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: '1.30.0'

      - name: Install goose
        run: |
          wget -q -O /usr/local/bin/goose https://github.com/pressly/goose/releases/download/v3.27.0/goose_linux_x86_64
          chmod +x /usr/local/bin/goose

      - uses: k1LoW/setup-tbls@v1
        with:
          version: v1.93.0

      - name: Run migrations
        run: goose -dir migrations postgres "postgres://postgres:postgres@localhost:5432/anti_yt_test?sslmode=disable" up

      - name: Generate sqlc
        run: sqlc generate

      - name: Install moq
        run: |
          wget -q -O moq.tar.gz https://github.com/matryer/moq/releases/download/v0.7.1/moq_Linux_x86_64.tar.gz
          tar -xzf moq.tar.gz moq
          mv moq /usr/local/bin/moq
          chmod +x /usr/local/bin/moq
          rm moq.tar.gz

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.6.0

      - name: Generate code
        run: go generate ./...

      - name: Generate tbls docs
        run: tbls doc "postgres://postgres:postgres@localhost:5432/anti_yt_test?sslmode=disable" docs/schema --er-format svg --rm-dist --force

      - name: Check generated code is up to date
        run: |
          if [ -n "$(git status --porcelain -- ':!docs/schema')" ]; then
            echo "::error::Generated code is out of date. Please run code generation locally and commit the changes."
            git diff -- ':!docs/schema'
            exit 1
          fi

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend

      - run: go build -v -o server ./cmd/api

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/anti_yt_test?sslmode=disable
        run: go test ./...
