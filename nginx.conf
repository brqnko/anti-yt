# cloudflaredからの接続を信頼してクライアントIPを取得
set_real_ip_from 172.30.0.0/16;
real_ip_header CF-Connecting-IP;

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# anti-yt は他人の YouTube 動画/チャンネルを表示するビューアなので、検索エンジンに
# インデックスさせるのは紹介系ページ (/, /about, /terms, /privacy) のみ。
# それ以外（/watch/<id>, /search, /channels/<id>, /playlists/<id> など）は noindex。
# $request_uri を使うことで内部 rewrite（@dynamic_or_404 → /index.html）の影響を受けず、
# id ルートの SPA シェルも含めて 1 か所で正しく判定できる。
map $request_uri $anti_yt_robots {
    default              "noindex, nofollow";
    "~^/($|\?)"          "index, follow";
    "~^/about($|[/?])"   "index, follow";
    "~^/terms($|[/?])"   "index, follow";
    "~^/privacy($|[/?])" "index, follow";
}

server {
    listen 80 default_server;
    server_name anti-yt.brqnko.rs;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://anti-yt-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cf-Ipcountry $http_cf_ipcountry;
        proxy_set_header Cf-Ray $http_cf_ray;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Service Worker — キャッシュ禁止（更新を即反映）
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options nosniff always;
    }

    # Web App Manifest — キャッシュ禁止
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options nosniff always;
    }

    # Viteハッシュ付き静的アセット — 長期キャッシュ
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff always;
    }

    # 画像 / アイコン / フォント — 1年キャッシュ（ハッシュ無しのため immutable は付けない）
    location ~* \.(png|jpe?g|gif|svg|webp|avif|ico|woff2?)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000";
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    # 静的ファイル + プリレンダ済みページ (/, /channels, /channels/explore,
    # /playlists, /search, /about, /terms, /privacy, /404, /analytics,
    # /history, /profile, /screen-time-settings, /register, /reactivation,
    # robots.txt, sitemap.xml)。`$uri/index.html` を直接当てることでディレクトリ
    # 自動リダイレクト (301) を回避。
    location / {
        root /usr/share/nginx/html;
        # index.html はキャッシュさせない（ASSET ハッシュは index.html 経由で配布）
        add_header Cache-Control "no-cache" always;
        # 紹介系ページ以外は noindex（@dynamic_or_404 から再ディスパッチされる
        # id ルートもここを通るため、$request_uri ベースのマップで一括判定）。
        add_header X-Robots-Tag $anti_yt_robots always;
        try_files $uri $uri/index.html @dynamic_or_404;
    }

    # 動的 SPA ルート (/watch/<id>, /channels/<id>, /channels/<id>/playlists,
    # /playlists/<id>) は SPA シェルへ。未知 URL は 404 を返し、下の error_page で
    # プリレンダされた /404/index.html を 404 ステータスのまま配信する。
    location @dynamic_or_404 {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
        if ($uri ~* ^/(watch/[^/]+|channels/[^/]+(/playlists)?|playlists/[^/]+)/?$) {
            rewrite ^ /index.html last;
        }
        return 404;
    }

    error_page 404 /404/index.html;
}

server {
    listen 80;
    server_name kioku.brqnko.rs;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://kioku-backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cf-Ipcountry $http_cf_ipcountry;
        proxy_set_header Cf-Ray $http_cf_ray;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /assets/ {
        root /usr/share/nginx/kioku;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff always;
    }

    location ~* \.(png|jpe?g|gif|svg|webp|avif|ico|woff2?)$ {
        root /usr/share/nginx/kioku;
        add_header Cache-Control "public, max-age=31536000";
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    # 認証必須の SPA ルート — SPA シェル(index.html)にフォールバック。
    # ランタイムの useDocumentHead が noindex,nofollow を付与する。
    location ~ ^/(dashboard|library|chat|podcast|profile|projects/|folders/|files/) {
        root /usr/share/nginx/kioku;
        add_header Cache-Control "no-cache" always;
        try_files /index.html =500;
    }

    # ルート — プリレンダされた index.html を直接配信。
    location = / {
        root /usr/share/nginx/kioku;
        add_header Cache-Control "no-cache" always;
        try_files /index.html =500;
    }

    # 静的ファイル + プリレンダ済み公開ページ (/tos, /privacy, /404,
    # robots.txt, sitemap.xml)。`$uri/index.html` を直接当てることで、
    # `$uri/` 経由のディレクトリ自動リダイレクト (301) を回避する。
    # 存在しなければ 404 を返し、下の error_page でプリレンダされた
    # /404/index.html を 404 ステータスのまま配信する。
    location / {
        root /usr/share/nginx/kioku;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404/index.html;
}

server {
    listen 80;
    server_name parquet-to-geojson.brqnko.rs;

    client_max_body_size 100M;

    gzip on;
    gzip_types application/json;
    gzip_min_length 256;

    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://parquet_to_geojson_api-api-1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

server {
    listen 80;
    server_name brqnko.rs;
    charset utf-8;

    location / {
        default_type text/plain;
        return 200 'ドメインの無駄遣いだなぁ。そうに決まってる。\n';
    }
}
