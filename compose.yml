services:
  backend:
    build:
      context: ./backend
    expose:
      - "8080"
    env_file:
      - .env
    secrets:
      - jwt-private
      - jwt-public
    restart: unless-stopped
    networks:
      app-network:
        # 共有ネットワーク上で他プロジェクトのサービス名と衝突しない一意な名前。
        # nginxはこのエイリアスを参照する
        aliases:
          - anti-yt-backend

  frontend:
    build:
      context: ./frontend
    volumes:
      - frontend-dist:/output
    restart: "no"

volumes:
  frontend-dist:
    external: true
    name: anti-yt-frontend-dist

secrets:
  jwt-private:
    file: ./secrets/jwt_private.pem
  jwt-public:
    file: ./secrets/jwt_public.pem
networks:
  app-network:
    external: true
