package: v1

output: api.gen.go

generate:
  models: true
  chi-server: true
  strict-server: true
  embedded-spec: true

compatibility:
  always-prefix-enum-values: true

output-options:
  skip-fmt: false
  type-mapping:
    string:
      formats:
        uuid:
          type: uuid.UUID
          import: github.com/google/uuid
        date-time:
          type: time.Time
          import: time
        date:
          type: time.Time
          import: time