version: "2"
cloud:
  organization: ""
  project: ""
  hostname: ""
servers: [ ]
sql:
  - engine: postgresql
    queries: "query/*.sql"
    schema: "migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/core/database/sqlc"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
overrides:
  go: null
plugins: [ ]
rules: [ ]
options: { }
